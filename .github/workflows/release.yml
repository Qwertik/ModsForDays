name: Build & Release Modpack

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build client pack
        run: |
          packwiz refresh
          packwiz curseforge export --side client -y
          # packwiz names the zip from pack.toml; rename to safe filename
          mv Zephyr*.zip "ZephyrsWake-${{ steps.version.outputs.tag }}-client.zip"
          # Move client zip to /tmp so it doesn't interfere with server build
          mv "ZephyrsWake-${{ steps.version.outputs.tag }}-client.zip" /tmp/

      - name: Build server pack
        run: |
          packwiz curseforge export --side server -y
          # Inject server startup scripts into overrides
          mkdir -p /tmp/server-repack
          cd /tmp/server-repack
          unzip "$GITHUB_WORKSPACE"/Zephyr*.zip
          cp "$GITHUB_WORKSPACE/server-files/start.sh" overrides/
          cp "$GITHUB_WORKSPACE/server-files/start.bat" overrides/
          rm -f "$GITHUB_WORKSPACE"/Zephyr*.zip
          zip -r "$GITHUB_WORKSPACE/ZephyrsWake-${{ steps.version.outputs.tag }}-server.zip" .
          cd "$GITHUB_WORKSPACE"
          rm -rf /tmp/server-repack
          # Bring client zip back
          mv "/tmp/ZephyrsWake-${{ steps.version.outputs.tag }}-client.zip" .

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          ADDED=""
          UPDATED=""
          REMOVED=""
          CONFIG=""

          if [ -z "$PREV_TAG" ]; then
            # First release — list all mods as added
            for f in mods/*.pw.toml; do
              NAME=$(grep '^name' "$f" | head -1 | sed 's/name = "//;s/"//')
              FILE=$(grep '^filename' "$f" | head -1 | sed 's/filename = "//;s/"//')
              ADDED="${ADDED}- ${NAME} (${FILE})\n"
            done
          else
            # Diff mods against previous tag
            for f in mods/*.pw.toml; do
              BASENAME=$(basename "$f")
              if ! git show "${PREV_TAG}:mods/${BASENAME}" &>/dev/null; then
                NAME=$(grep '^name' "$f" | head -1 | sed 's/name = "//;s/"//')
                FILE=$(grep '^filename' "$f" | head -1 | sed 's/filename = "//;s/"//')
                ADDED="${ADDED}- ${NAME} (${FILE})\n"
              elif ! git diff --quiet "${PREV_TAG}" -- "mods/${BASENAME}"; then
                NAME=$(grep '^name' "$f" | head -1 | sed 's/name = "//;s/"//')
                FILE=$(grep '^filename' "$f" | head -1 | sed 's/filename = "//;s/"//')
                UPDATED="${UPDATED}- ${NAME} (${FILE})\n"
              fi
            done
            # Check for removed mods
            for f in $(git ls-tree --name-only "${PREV_TAG}" mods/); do
              if [ ! -f "$f" ]; then
                NAME=$(git show "${PREV_TAG}:${f}" | grep '^name' | head -1 | sed 's/name = "//;s/"//')
                REMOVED="${REMOVED}- ${NAME}\n"
              fi
            done
            # Check for config changes
            if ! git diff --quiet "${PREV_TAG}" -- config/ 2>/dev/null; then
              for f in $(git diff --name-only "${PREV_TAG}" -- config/); do
                CONFIG="${CONFIG}- ${f}\n"
              done
            fi
          fi

          # Build changelog
          NOTES=""
          if [ -n "$ADDED" ]; then
            NOTES="${NOTES}### Added\n${ADDED}\n"
          fi
          if [ -n "$UPDATED" ]; then
            NOTES="${NOTES}### Updated\n${UPDATED}\n"
          fi
          if [ -n "$REMOVED" ]; then
            NOTES="${NOTES}### Removed\n${REMOVED}\n"
          fi
          if [ -n "$CONFIG" ]; then
            NOTES="${NOTES}### Config Changes\n${CONFIG}\n"
          fi
          if [ -z "$NOTES" ]; then
            NOTES="No mod changes in this release."
          fi

          echo -e "$NOTES" > /tmp/changelog.md
          {
            echo "notes<<CHANGELOG_EOF"
            echo -e "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge (client)
        id: cf-upload
        if: vars.CURSEFORGE_PROJECT_ID != ''
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          game_endpoint: minecraft
          file_path: ZephyrsWake-${{ steps.version.outputs.tag }}-client.zip
          display_name: "Zephyr's Wake ${{ steps.version.outputs.tag }}"
          changelog: ${{ steps.changelog.outputs.notes }}
          changelog_type: markdown
          game_versions: "1.21.1"
          release_type: release

      - name: Upload to CurseForge (server)
        if: vars.CURSEFORGE_PROJECT_ID != '' && steps.cf-upload.outputs.id != ''
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          game_endpoint: minecraft
          file_path: ZephyrsWake-${{ steps.version.outputs.tag }}-server.zip
          display_name: "Zephyr's Wake ${{ steps.version.outputs.tag }} (Server)"
          changelog: ${{ steps.changelog.outputs.notes }}
          changelog_type: markdown
          game_versions: "1.21.1"
          release_type: release
          parent_file_id: ${{ steps.cf-upload.outputs.id }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/changelog.md
          files: |
            ZephyrsWake-${{ steps.version.outputs.tag }}-client.zip
            ZephyrsWake-${{ steps.version.outputs.tag }}-server.zip
